<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepestate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }
    .hero {
      text-align: center;
      padding: 4rem 0 2rem;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: #f8fafc;
    }
    .hero .subtitle {
      font-size: 1.1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .price {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.95rem;
      color: #7dd3fc;
      margin-bottom: 2.5rem;
    }
    .cta {
      margin: 2rem 0;
    }
    .placeholder {
      text-align: center;
      color: #64748b;
      font-style: italic;
      padding: 3rem 0;
      border: 1px dashed #334155;
      border-radius: 8px;
    }
    footer {
      margin-top: auto;
      padding-top: 3rem;
      text-align: center;
      color: #475569;
      font-size: 0.85rem;
    }
    iframe {
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>How do I know if a property is actually worth the price</h1>
      <p class="subtitle">ML-powered real estate valuation and investment analysis tool</p>
      <p class="price">Coming soon &mdash; early access from $8/mo</p>
    </section>
    <div class="cta">
      <p class="placeholder">Signup form coming soon</p>
    </div>
  </div>
  <footer>Powered by independent makers</footer>
</body>
</html>
